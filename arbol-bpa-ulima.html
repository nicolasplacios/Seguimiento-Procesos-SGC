;\n    gap: 10px;\n    min-width: 240px;\n    max-width: 440px;\n    cursor: grab;\n    transition: box-shadow 0.15s, transform 0.12s;\n    border-radius: 1px;\n  }\n  .node-body:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.12); }\n  .node-body:active { cursor: grabbing; }\n\n  .node-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }\n  .node-title {\n    font-size: 13px;\n    font-weight: 500;\n    line-height: 1.3;\n    word-break: break-word;\n  }\n  .node-code {\n    font-family: \"SF Mono\", Menlo, Consolas, monospace;\n    font-size: 10.5px;\n    letter-spacing: 0.3px;\n    opacity: 0.7;\n    line-height: 1.2;\n  }\n  .node.hide-codes .node-code { display: none; }\n\n  .node-actions {\n    display: flex;\n    gap: 2px;\n    opacity: 0;\n    transition: opacity 0.12s;\n    flex-shrink: 0;\n  }\n  .node-body:hover .node-actions { opacity: 1; }\n  .node-action {\n    width: 24px; height: 24px;\n    display: flex; align-items: center; justify-content: center;\n    border-radius: 2px;\n    transition: background 0.12s;\n  }\n  .node-action:hover { background: rgba(0,0,0,0.12); }\n  .node-action svg { width: 13px; height: 13px; stroke-width: 2; }\n  .node-action.light svg { stroke: currentColor; }\n\n  .node-count {\n    font-size: 10.5px;\n    font-weight: 600;\n    padding: 2px 7px;\n    border-radius: 10px;\n    background: rgba(255,255,255,0.18);\n    margin-left: 4px;\n    flex-shrink: 0;\n  }\n\n  /* Node type color variants */\n  .node[data-type=\"tipo\"] > .node-body {\n    background: #1A1A1A;\n    color: #fff;\n  }\n  .node[data-type=\"proceso\"] > .node-body {\n    background: #E8450A;\n    color: #fff;\n  }\n  .node[data-type=\"subproceso\"] > .node-body {\n    background: #3A3A3A;\n    color: #fff;\n  }\n  .node[data-type=\"documento\"] > .node-body {\n    background: #F5F5F5;\n    color: #1A1A1A;\n    border: 1px solid #D0D0D0;\n  }\n  .node[data-type=\"documento\"][data-status=\"DESARROLLADO\"] > .node-body {\n    background: #D32F2F;\n    color: #fff;\n    border-color: #D32F2F;\n  }\n  .node[data-type=\"documento\"][data-status=\"DESACTUALIZADO\"] > .node-body {\n    background: #ECECEC;\n    color: #777;\n    border: 1px dashed #B0B0B0;\n    opacity: 0.85;\n  }\n  .node[data-type=\"documento\"][data-status=\"OFICIAL\"] > .node-body {\n    background: #E4F2E4;\n    color: #1E5E1E;\n    border: 1px solid #8CC58C;\n  }\n  .node[data-type=\"instructivo\"] > .node-body {\n    background: #FFF4EE;\n    color: #8A2A05;\n    border: 1px solid #F4C9B2;\n    min-width: 220px;\n  }\n  .node[data-type=\"formato\"] > .node-body {\n    background: #E8F0FE;\n    color: #1A3A7A;\n    border: 1px solid #B8CCF0;\n    min-width: 220px;\n  }\n  .node[data-type=\"formato\"][data-status=\"DESARROLLADO\"] > .node-body {\n    background: #D32F2F; color: #fff; border-color: #D32F2F;\n  }\n  .node[data-type=\"formato\"][data-status=\"DESACTUALIZADO\"] > .node-body {\n    background: #ECECEC; color: #777; border: 1px dashed #B0B0B0;\n  }\n\n  /* Documento count badge variants for readability */\n  .node[data-type=\"documento\"] .node-count,\n  .node[data-type=\"instructivo\"] .node-count,\n  .node[data-type=\"formato\"] .node-count {\n    background: rgba(0,0,0,0.08);\n  }\n  .node[data-type=\"documento\"][data-status=\"DESARROLLADO\"] .node-count {\n    background: rgba(255,255,255,0.25);\n  }\n\n  /* Status pill on documents */\n  .status-pill {\n    display: inline-flex;\n    align-items: center;\n    gap: 5px;\n    padding: 2px 8px;\n    font-size: 9.5px;\n    font-weight: 700;\n    letter-spacing: 0.8px;\n    text-transform: uppercase;\n    border-radius: 2px;\n    flex-shrink: 0;\n    cursor: pointer;\n    transition: filter 0.12s;\n  }\n  .status-pill:hover { filter: brightness(0.92); }\n  .status-pill[data-status=\"OFICIAL\"] { background: #2E7D2E; color: #fff; }\n  .status-pill[data-status=\"DESARROLLADO\"] { background: #fff; color: #D32F2F; }\n  .status-pill[data-status=\"DESACTUALIZADO\"] { background: #999; color: #fff; text-decoration: line-through; text-decoration-thickness: 1px; }\n\n  /* Warning badge for ambiguous subprocess */\n  .warn-badge {\n    display: inline-flex;\n    align-items: center;\n    gap: 4px;\n    padding: 2px 7px;\n    font-size: 9.5px;\n    font-weight: 700;\n    letter-spacing: 0.6px;\n    text-transform: uppercase;\n    background: #FFC107;\n    color: #1A1A1A;\n    border-radius: 2px;\n    margin-top: 4px;\n    align-self: flex-start;\n  }\n  .warn-badge svg { width: 10px; height: 10px; }\n\n  /* Add-child dropdown */\n  .add-menu {\n    position: absolute;\n    background: #fff;\n    border: 1px solid #D0D0D0;\n    box-shadow: 0 10px 30px rgba(0,0,0,0.18);\n    min-width: 180px;\n    z-index: 200;\n    display: flex;\n    flex-direction: column;\n    padding: 4px 0;\n  }\n  .add-menu-item {\n    padding: 9px 14px;\n    font-size: 12.5px;\n    color: #1A1A1A;\n    text-align: left;\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    transition: background 0.1s;\n  }\n  .add-menu-item:hover { background: #F5F5F5; }\n  .add-menu-item .sw {\n    width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0;\n  }\n  .add-menu-divider { height: 1px; background: #EEE; margin: 4px 0; }\n\n  /* ============ MODAL ============ */\n  .modal-backdrop {\n    position: fixed; inset: 0;\n    background: rgba(10,10,10,0.55);\n    backdrop-filter: blur(2px);\n    display: none;\n    align-items: center; justify-content: center;\n    z-index: 1000;\n    animation: fadeIn 0.15s ease;\n  }\n  .modal-backdrop.open { display: flex; }\n  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n  .modal {\n    background: #fff;\n    width: 520px;\n    max-width: calc(100vw - 48px);\n    max-height: calc(100vh - 48px);\n    display: flex;\n    flex-direction: column;\n    box-shadow: 0 20px 60px rgba(0,0,0,0.35);\n    animation: slideUp 0.18s ease;\n  }\n  @keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }\n  .modal-head {\n    padding: 18px 22px;\n    border-bottom: 1px solid #EEE;\n    display: flex;\n    align-items: flex-start;\n    justify-content: space-between;\n    gap: 12px;\n  }\n  .modal-head-main { display: flex; flex-direction: column; gap: 3px; }\n  .modal-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #888; }\n  .modal-title { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }\n  .modal-close {\n    width: 28px; height: 28px;\n    display: flex; align-items: center; justify-content: center;\n    color: #888;\n    font-size: 16px;\n    transition: color 0.12s, background 0.12s;\n    border-radius: 2px;\n  }\n  .modal-close:hover { color: #1A1A1A; background: #F0F0F0; }\n  .modal-body {\n    padding: 20px 22px;\n    overflow-y: auto;\n    display: flex;\n    flex-direction: column;\n    gap: 16px;\n  }\n  .form-field { display: flex; flex-direction: column; gap: 6px; }\n  .form-label {\n    font-size: 11px;\n    font-weight: 600;\n    letter-spacing: 0.6px;\n    text-transform: uppercase;\n    color: #666;\n  }\n  .form-input, .form-select, .form-textarea {\n    padding: 9px 12px;\n    border: 1px solid #D0D0D0;\n    background: #FAFAFA;\n    font-size: 13px;\n    color: #1A1A1A;\n    transition: border-color 0.12s, background 0.12s;\n  }\n  .form-input:focus, .form-select:focus, .form-textarea:focus {\n    outline: none; border-color: #E8450A; background: #fff;\n  }\n  .form-textarea { resize: vertical; min-height: 70px; }\n\n  .status-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }\n  .status-opt {\n    padding: 10px 8px;\n    font-size: 11px;\n    font-weight: 600;\n    letter-spacing: 0.6px;\n    text-transform: uppercase;\n    border: 2px solid transparent;\n    background: #F5F5F5;\n    color: #555;\n    text-align: center;\n    transition: all 0.12s;\n  }\n  .status-opt:hover { background: #EEE; }\n  .status-opt.sel[data-status=\"OFICIAL\"] { background: #2E7D2E; color: #fff; border-color: #2E7D2E; }\n  .status-opt.sel[data-status=\"DESARROLLADO\"] { background: #D32F2F; color: #fff; border-color: #D32F2F; }\n  .status-opt.sel[data-status=\"DESACTUALIZADO\"] { background: #888; color: #fff; border-color: #888; }\n\n  .modal-foot {\n    padding: 14px 22px;\n    border-top: 1px solid #EEE;\n    display: flex;\n    justify-content: space-between;\n    gap: 8px;\n  }\n  .modal-foot-group { display: flex; gap: 8px; }\n\n  /* Confirm dialog */\n  .confirm .modal { width: 400px; }\n  .confirm-msg { color: #444; font-size: 13.5px; line-height: 1.5; }\n  .confirm-target {\n    margin-top: 10px;\n    padding: 10px 12px;\n    background: #F5F5F5;\n    border-left: 3px solid #D32F2F;\n    font-size: 12.5px;\n    color: #1A1A1A;\n    font-weight: 500;\n  }\n\n  /* ============ TOAST ============ */\n  .toast-stack {\n    position: fixed;\n    bottom: 24px;\n    left: 50%;\n    transform: translateX(-50%);\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n    z-index: 2000;\n    pointer-events: none;\n  }\n  .toast {\n    background: #1A1A1A;\n    color: #fff;\n    padding: 10px 16px;\n    font-size: 12.5px;\n    box-shadow: 0 6px 20px rgba(0,0,0,0.25);\n    display: flex; align-items: center; gap: 10px;\n    animation: toastIn 0.2s ease;\n    pointer-events: auto;\n  }\n  @keyframes toastIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }\n  .toast.success { border-left: 3px solid #8CC58C; }\n  .toast.error { border-left: 3px solid #D32F2F; }\n  .toast.info { border-left: 3px solid #E8450A; }\n\n  /* ============ LAYOUT VARIANTS ============ */\n  /* Vertical indented (file-explorer-like) */\n  body.layout-indented .children-wrap { padding-left: 22px; }\n  body.layout-indented .node-body { min-width: 280px; max-width: 520px; }\n  body.layout-indented .node-row > .connector { width: 10px; }\n  body.layout-indented .children-wrap::before { left: 11px; }\n\n  /* Compact */\n  body.density-compact .node-body { padding: 5px 10px; min-height: 34px; }\n  body.density-compact .node-title { font-size: 12px; }\n  body.density-compact .node-code { font-size: 10px; }\n  body.density-compact .children-wrap { gap: 4px; }\n\n  /* Empty state */\n  .empty-state {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    padding: 60px 20px;\n    color: #888;\n    gap: 12px;\n    text-align: center;\n  }\n  .empty-state strong { color: #1A1A1A; }\n\n  /* Drop zone indicators on children-wrap */\n  .children-wrap.drop-zone-active { background: rgba(232,69,10,0.05); border: 1px dashed #E8450A; }\n\n  /* Legend */\n  .legend {\n    position: fixed;\n    right: 16px;\n    bottom: 16px;\n    background: #fff;\n    border: 1px solid #D0D0D0;\n    padding: 10px 14px;\n    display: flex;\n    gap: 14px;\n    font-size: 11px;\n    color: #555;\n    box-shadow: 0 4px 16px rgba(0,0,0,0.08);\n    z-index: 50;\n    flex-wrap: wrap;\n    max-width: 400px;\n  }\n  .legend-item { display: flex; align-items: center; gap: 6px; }\n  .legend-sw { width: 12px; height: 12px; border-radius: 1px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.08); }\n\n  /* Scrollbars */\n  .canvas::-webkit-scrollbar { width: 12px; height: 12px; }\n  .canvas::-webkit-scrollbar-track { background: #E5E5E5; }\n  .canvas::-webkit-scrollbar-thumb { background: #B0B0B0; border: 2px solid #E5E5E5; }\n  .canvas::-webkit-scrollbar-thumb:hover { background: #888; }\n  .canvas::-webkit-scrollbar-corner { background: #E5E5E5; }\n\n  /* Hide codes tweak */\n  body.hide-codes .node-code { display: none; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div class=\"app\">\n\n  <!-- HEADER -->\n  <header class=\"header\">\n    <div class=\"brand\">\n      <div class=\"brand-mark\">UL<\u002Fdiv>\n      <div class=\"brand-titles\">\n        <div class=\"brand-title\">DPA · Árbol de Procesos<\u002Fdiv>\n n  // ---------- Utilities ----------\n  function uid() {\n    const n = (window.__nextIdCounter || 1);\n    window.__nextIdCounter = n + 1;\n    return \"n_\" + n;\n  }\n\n  function loadState() {\n    try {\n      const raw = localStorage.getItem(STORAGE_KEY);\n      if (raw) {\n        const parsed = JSON.parse(raw);\n        if (parsed && parsed.roots) return parsed;\n      }\n    } catch (e) {}\n    return JSON.parse(JSON.stringify(window.INITIAL_TREE));\n  }\n\n  function loadPrefs() {\n    try {\n      const raw = localStorage.getItem(PREFS_KEY);\n      if (raw) return JSON.parse(raw);\n    } catch (e) {}\n    return { layout: \"horizontal\", density: \"comfortable\", showCodes: true };\n  }\n\n  function savePrefs() {\n    localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));\n  }\n\n  function saveState() {\n    clearTimeout(saveTimer);\n    saveDotEl.classList.add(\"saving\");\n    saveTextEl.textContent = \"Guardando…\";\n    saveTimer = setTimeout(() => {\n      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));\n      saveDotEl.classList.remove(\"saving\");\n      saveTextEl.textContent = \"Guardado\";\n    }, 280);\n  }\n\n  // ---------- Tree walking ----------\n  function walk(nodes, fn, parent = null) {\n    for (const n of nodes) {\n      fn(n, parent);\n      if (n.children) walk(n.children, fn, n);\n    }\n  }\n\n  function findNode(id, nodes = state.roots, parent = null) {\n    for (const n of nodes) {\n      if (n.id === id) return { node: n, parent, siblings: nodes };\n      if (n.children) {\n        const r = findNode(id, n.children, n);\n        if (r) return r;\n      }\n    }\n    return null;\n  }\n\n  function removeNode(id) {\n    const found = findNode(id);\n    if (!found) return null;\n    const idx = found.siblings.indexOf(found.node);\n    found.siblings.splice(idx, 1);\n    return found.node;\n  }\n\n  function countDescendants(node, predicate) {\n    let c = 0;\n    if (node.children) {\n      for (const ch of node.children) {\n        if (predicate(ch)) c++;\n        c += countDescendants(ch, predicate);\n      }\n    }\n    return c;\n  }\n\n  // ---------- Node type helpers ----------\n  const ORDER = [\"tipo\", \"proceso\", \"subproceso\", \"documento\", \"instructivo\", \"formato\"];\n  const TYPE_LABEL = {\n    tipo: \"Tipo de proceso\",\n    proceso: \"Proceso\",\n    subproceso: \"Subproceso\",\n    documento: \"Documento\",\n    instructivo: \"Instructivo\",\n    formato: \"Formato\",\n  };\n\n  function childTypesAllowed(parentType) {\n    switch (parentType) {\n      case null: case undefined: return [\"tipo\"];\n      case \"tipo\": return [\"proceso\"];\n      case \"proceso\": return [\"subproceso\"];\n      case \"subproceso\": return [\"documento\"];\n      case \"documento\": return [\"instructivo\", \"formato\"];\n      case \"instructivo\": return [\"formato\"];\n      case \"formato\": return [];\n      default: return [];\n    }\n  }\n\n  function canMoveInto(node, newParent) {\n    // newParent null = root level\n    const parentType = newParent ? newParent.type : null;\n    const allowed = childTypesAllowed(parentType);\n    if (!allowed.includes(node.type)) return false;\n    // don't allow moving into own descendant\n    if (newParent && isDescendant(newParent, node)) return false;\n    return true;\n  }\n\n  function isDescendant(candidate, ancestor) {\n    if (candidate.id === ancestor.id) return true;\n    if (!ancestor.children) return false;\n    for (const ch of ancestor.children) {\n      if (isDescendant(candidate, ch)) return true;\n    }\n    return false;\n  }\n\n  // ---------- Rendering ----------\n  function matchesFilter(node) {\n    // Returns true if the node OR any descendant matches current search/filter\n    const q = search.trim().toLowerCase();\n    let selfMatch = true;\n    if (q) {\n      const hay = (node.name + \" \" + (node.code || \"\")).toLowerCase();\n      selfMatch = hay.includes(q);\n    }\n    if (statusFilter && (node.type === \"documento\" || node.type === \"instructivo\" || node.type === \"formato\")) {\n      if ((node.status || \"OFICIAL\") !== statusFilter) selfMatch = false;\n    } else if (statusFilter && node.type !== \"documento\" && node.type !== \"instructivo\" && node.type !== \"formato\") {\n      // non-doc nodes don't satisfy status filter on their own\n      selfMatch = false;\n    }\n    if (selfMatch) return true;\n    if (node.children) {\n      for (const ch of node.children) if (matchesFilter(ch)) return true;\n    }\n    return false;\n  }\n\n  function render() {\n    treeEl.innerHTML = \"\";\n    if (!state.roots || state.roots.length === 0) {\n      treeEl.innerHTML = `<div class=\"empty-state\">\n        <strong>No hay nodos.<\u002Fstrong>\n        <div>Importa un JSON o restaura los datos iniciales.<\u002Fdiv>\n      <\u002Fdiv>`;\n      updateStats();\n      return;\n    }\n    for (const root of state.roots) {\n      const row = renderRow(root, 0);\n      if (row) treeEl.appendChild(row);\n    }\n    updateStats();\n    applyPrefs();\n  }\n\n  function renderRow(node, depth) {\n    if (!matchesFilter(node)) return null;\n\n    const row = document.createElement(\"li\");\n    row.className = \"node-row\";\n    row.dataset.id = node.id;\n\n    // connector for non-root rows\n    const conn = document.createElement(\"div\");\n    conn.className = \"connector\";\n    row.appendChild(conn);\n\n    // node wrapper + children\n    const wrap = document.createElement(\"div\");\n    wrap.className = \"node-wrap\";\n\n    const hasChildren = node.children && node.children.length > 0;\n\n    // Render visible children list (post-filter)\n    const visibleChildren = (node.children || []).filter(matchesFilter);\n\n    const nodeEl = document.createElement(\"div\");\n    nodeEl.className = \"node\";\n    nodeEl.dataset.type = node.type;\n    nodeEl.dataset.id = node.id;\n    if (node.type === \"documento\" || node.type === \"instructivo\" || node.type === \"formato\") {\n      nodeEl.dataset.status = node.status || \"OFICIAL\";\n    }\n    nodeEl.draggable = true;\n\n    // Toggle\n    const toggle = document.createElement(\"button\");\n    toggle.className = \"node-toggle\" + (hasChildren ? \"\" : \" empty\") + (node.collapsed ? \" collapsed\" : \"\");\n    toggle.innerHTML = hasChildren\n      ? `<svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"/><\u002Fsvg>`\n      : `<svg width=\"6\" height=\"6\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><circle cx=\"12\" cy=\"12\" r=\"4\"/><\u002Fsvg>`;\n    toggle.title = node.collapsed ? \"Expandir\" : \"Colapsar\";\n    toggle.addEventListener(\"click\", (e) => {\n      e.stopPropagation();\n      if (!hasChildren) return;\n      node.collapsed = !node.collapsed;\n      saveState();\n      render();\n    });\n    nodeEl.appendChild(toggle);\n\n    // Body\n    const body = document.createElement(\"div\");\n    body.className = \"node-body\";\n\n    // Main content\n    const main = document.createElement(\"div\");\n    main.className = \"node-main\";\n    const title = document.createElement(\"div\");\n    title.className = \"node-title\";\n    title.textContent = node.name || \"(sin nombre)\";\n    main.appendChild(title);\n\n    if (node.code) {\n      const code = document.createElement(\"div\");\n      code.className = \"node-code\";\n      code.textContent = node.code;\n      main.appendChild(code);\n    }\n\n    if (node.type === \"subproceso\" && node.ambiguous) {\n      const warn = document.createElement(\"div\");\n      warn.className = \"warn-badge\";\n      warn.innerHTML = `\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"/><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"/><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"/><\u002Fsvg>\n        Por definir\n      `;\n      main.appendChild(warn);\n    }\n    body.appendChild(main);\n\n    // Status pill for docs/instructivos\n    if (node.type === \"documento\" || node.type === \"instructivo\" || node.type === \"formato\") {\n      const pill = document.createElement(\"button\");\n      pill.className = \"status-pill\";\n      pill.dataset.status = node.status || \"OFICIAL\";\n      pill.textContent = node.status || \"OFICIAL\";\n      pill.title = \"Click para cambiar estado\";\n      pill.addEventListener(\"click\", (e) => {\n        e.stopPropagation();\n        cycleStatus(node);\n      });\n      body.appendChild(pill);\n    }\n\n    // Count of children (for containers)\n    if (node.type !== \"documento\" && node.type !== \"instructivo\" && hasChildren) {\n      const docCount = countDescendants(node, (n) => n.type === \"documento\");\n      if (docCount > 0) {\n        const cnt = document.createElement(\"span\");\n        cnt.className = \"node-count\";\n        cnt.textContent = docCount + (docCount === 1 ? \" doc\" : \" docs\");\n        body.appendChild(cnt);\n      }\n    }\n\n    // Actions\n    const actions = document.createElement(\"div\");\n    actions.className = \"node-actions\";\n    const allowedChildren = childTypesAllowed(node.type);\n    if (allowedChildren.length > 0) {\n      const addBtn = document.createElement(\"button\");\n      addBtn.className = \"node-action light\";\n      addBtn.title = \"Agregar \" + allowedChildren.map((t) => TYPE_LABEL[t].toLowerCase()).join(\"/\");\n      addBtn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"/><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/><\u002Fsvg>`;\n      addBtn.addEventListener(\"click\", (e) => {\n        e.stopPropagation();\n        openAddChildMenu(e.currentTarget, node);\n      });\n      actions.appendChild(addBtn);\n    }\n\n    const editBtn = document.createElement(\"button\");\n    editBtn.className = \"node-action light\";\n    editBtn.title = \"Editar\";\n    editBtn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\"/><path d=\"M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z\"/><\u002Fsvg>`;\n    editBtn.addEventListener(\"click\", (e) => {\n      e.stopPropagation();\n      openEditModal(node.id);\n    });\n    actions.appendChild(editBtn);\n\n    // Open button for documents/instructivos/formatos\n    if (node.type === \"documento\" || node.type === \"instructivo\" || node.type === \"formato\") {\n      const openBtn = document.createElement(\"button\");\n      openBtn.className = \"node-action light\";\n      openBtn.title = node.path ? \"Abrir documento\" : \"Agregar ruta y abrir\";\n      openBtn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6\"/><polyline points=\"15 3 21 3 21 9\"/><line x1=\"10\" y1=\"14\" x2=\"21\" y2=\"3\"/><\u002Fsvg>`;\n      if (node.path) openBtn.style.color = \"#E8450A\";\n      openBtn.addEventListener(\"click\", (e) => {\n        e.stopPropagation();\n        openSidePanel(node.id);\n      });\n      actions.appendChild(openBtn);\n    }\n\n    const delBtn = document.createElement(\"button\");\n    delBtn.className = \"node-action light\";\n    delBtn.title = \"Eliminar\";\n    delBtn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 6 5 6 21 6\"/><path d=\"M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6\"/><path d=\"M10 11v6\"/><path d=\"M14 11v6\"/><path d=\"M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2\"/><\u002Fsvg>`;\n    delBtn.addEventListener(\"click\", (e) => {\n      e.stopPropagation();\n      requestDelete(node);\n    });\n    actions.appendChild(delBtn);\n\n    body.appendChild(actions);\n\n    // Double click to edit\n    body.addEventListener(\"dblclick\", (e) => {\n      e.stopPropagation();\n      openEditModal(node.id);\n    });\n\n    // Drag & drop\n    nodeEl.addEventListener(\"dragstart\", (e) => {\n      e.dataTransfer.effectAllowed = \"move\";\n      e.dataTransfer.setData(\"text/plain\", node.id);\n      nodeEl.classList.add(\"dragging\");\n    });\n    nodeEl.addEventListener(\"dragend\", () => {\n      nodeEl.classList.remove(\"dragging\");\n      document.querySelectorAll(\".drag-over\").forEach((el) => el.classList.remove(\"drag-over\"));\n    });\n    nodeEl.addEventListener(\"dragover\", (e) => {\n      const draggedId = getDraggedId();\n      if (!draggedId || draggedId === node.id) return;\n      const dragged = findNode(draggedId);\n      if (!dragged) return;\n      if (!canMoveInto(dragged.node, node)) return;\n      e.preventDefault();\n      e.dataTransfer.dropEffect = \"move\";\n      nodeEl.classList.add(\"drag-over\");\n    });\n    nodeEl.addEventListener(\"dragleave\", () => nodeEl.classList.remove(\"drag-over\"));\n    nodeEl.addEventListener(\"drop\", (e) => {\n      e.preventDefault();\n      e.stopPropagation();\n      nodeEl.classList.remove(\"drag-over\");\n      const draggedId = e.dataTransfer.getData(\"text/plain\");\n      if (!draggedId || draggedId === node.id) return;\n      doMove(draggedId, node);\n    });\n\n    nodeEl.appendChild(body);\n    wrap.appendChild(nodeEl);\n\n    // Children (only if not collapsed)\n    if (hasChildren && !node.collapsed && visibleChildren.length > 0) {\n      const childrenWrap = document.createElement(\"ul\");\n      childrenWrap.className = \"children-wrap\";\n      for (const ch of visibleChildren) {\n        const childRow = renderRow(ch, depth + 1);\n        if (childRow) childrenWrap.appendChild(childRow);\n      }\n      wrap.appendChild(childrenWrap);\n    }\n\n    row.appendChild(wrap);\n    return row;\n  }\n\n  function getDraggedId() {\n    const dragging = document.querySelector(\".node.dragging\");\n    return dragging ? dragging.dataset.id : null;\n  }\n\n  function doMove(draggedId, newParent) {\n    const dragged = findNode(draggedId);\n    if (!dragged) return;\n    if (!canMoveInto(dragged.node, newParent)) {\n      toast(\"No se puede mover ahí\", \"error\");\n      return;\n    }\n    // remove from old\n    const idx = dragged.siblings.indexOf(dragged.node);\n    dragged.siblings.splice(idx, 1);\n    // add to new\n    if (!newParent.children) newParent.children = [];\n    newParent.children.push(dragged.node);\n    newParent.collapsed = false;\n    saveState();\n    render();\n    toast(`Movido a \"${truncate(newParent.name, 40)}\"`, \"success\");\n  }\n\n  function truncate(s, n) {\n    s = s || \"\";\n    return s.length > n ? s.slice(0, n - 1) + \"…\" : s;\n  }\n\n  // ---------- Status cycle ----------\n  const STATUS_CYCLE = [\"OFICIAL\", \"DESARROLLADO\", \"DESACTUALIZADO\"];\n  function cycleStatus(node) {\n    const cur = node.status || \"OFICIAL\";\n    const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur) + 1) % STATUS_CYCLE.length];\n    node.status = next;\n    saveState();\n    render();\n  }\n\n  // ---------- Stats ----------\n  function updateStats() {\n    let total = 0, ofi = 0, des = 0, old = 0;\n    walk(state.roots || [], (n) => {\n      if (n.type === \"documento\" || n.type === \"instructivo\" || n.type === \"formato\") {\n        total++;\n        const s = n.status || \"OFICIAL\";\n        if (s === \"OFICIAL\") ofi++;\n        else if (s === \"DESARROLLADO\") des++;\n        else if (s === \"DESACTUALIZADO\") old++;\n      }\n    });\n    $(\"#st-total\").textContent = total;\n    $(\"#st-oficial\").textContent = ofi;\n    $(\"#st-desarrollado\").textContent = des;\n    $(\"#st-desactualizado\").textContent = old;\n  }\n\n  // ---------- Add child menu ----------\n  function openAddChildMenu(anchorEl, parentNode) {\n    closeAddMenu();\n    const allowed = childTypesAllowed(parentNode.type);\n    if (allowed.length === 0) return;\n    const menu = document.createElement(\"div\");\n    menu.className = \"add-menu\";\n    const COLORS = {\n      tipo: \"#1A1A1A\", proceso: \"#E8450A\", subproceso: \"#3A3A3A\",\n      documento: \"#F5F5F5\", instructivo: \"#FFF4EE\", formato: \"#E8F0FE\"\n    };\n    for (const t of allowed) {\n      const item = document.createElement(\"button\");\n      item.className = \"add-menu-item\";\n      item.innerHTML = `<span class=\"sw\" style=\"background:${COLORS[t]}; border:1px solid rgba(0,0,0,0.1)\"><\u002Fspan>Agregar ${TYPE_LABEL[t].toLowerCase()}`;\n      item.addEventListener(\"click\", (e) => {\n        e.stopPropagation();\n        addChild(parentNode, t);\n        closeAddMenu();\n      });\n      menu.appendChild(item);\n    }\n    document.body.appendChild(menu);\n    const rect = anchorEl.getBoundingClientRect();\n    menu.style.left = Math.min(rect.left, window.innerWidth - 200) + \"px\";\n    menu.style.top = (rect.bottom + 4) + \"px\";\n    openAddMenu = menu;\n    setTimeout(() => document.addEventListener(\"click\", closeAddMenu, { once: true }), 0);\n  }\n\n  function closeAddMenu() {\n    if (openAddMenu) { openAddMenu.remove(); openAddMenu = null; }\n  }\n\n  function addChild(parent, type) {\n    const node = {\n      id: uid(),\n      type,\n      name: defaultNameFor(type),\n      code: \"\",\n      collapsed: false,\n      children: []\n    };\n    if (type === \"documento\" || type === \"instructivo\" || type === \"formato\") node.status = \"OFICIAL\";\n    if (!parent.children) parent.children = [];\n    parent.children.push(node);\n    parent.collapsed = false;\n    saveState();\n    render();\n    openEditModal(node.id);\n  }\n\n  function defaultNameFor(type) {\n    return ({\n      tipo: \"Nuevo tipo de proceso\",\n      proceso: \"Nuevo proceso\",\n      subproceso: \"Nuevo subproceso\",\n      documento: \"Nuevo procedimiento\",\n      instructivo: \"Nuevo instructivo\",\n      formato: \"Nuevo formato\",\n    })[type] || \"Nuevo nodo\";\n  }\n\n  function addRoot() {\n    const node = {\n      id: uid(), type: \"tipo\",\n      name: defaultNameFor(\"tipo\"),\n      code: \"\", collapsed: false, children: []\n    };\n    state.roots.push(node);\n    saveState(); render();\n    openEditModal(node.id);\n  }\n\n  // ---------- Edit Modal ----------\n  function openEditModal(nodeId) {\n    const found = findNode(nodeId);\n    if (!found) return;\n    editingNodeId = nodeId;\n    const node = found.node;\n    $(\"#em-eyebrow\").textContent = TYPE_LABEL[node.type] || \"Nodo\";\n    $(\"#em-title\").textContent = node.name || \"(sin nombre)\";\n    $(\"#em-name\").value = node.name || \"\";\n    $(\"#em-code\").value = node.code || \"\";\n\n    // Path field only for documents/instructivos\n    const isDoc = node.type === \"documento\" || node.type === \"instructivo\" || node.type === \"formato\";\n    $(\"#em-path-field\").style.display = isDoc ? \"\" : \"none\";\n    $(\"#em-path\").value = node.path || \"\";\n\n    // Toggle status field\n    const showStatus = isDoc;\n    $(\"#em-status-field\").style.display = showStatus ? \"\" : \"none\";\n    if (showStatus) {\n      const cur = node.status || \"OFICIAL\";\n      $$(\"#em-status .status-opt\").forEach((b) => {\n        b.classList.toggle(\"sel\", b.dataset.status === cur);\n      });\n    }\n\n    // Code field hidden for tipo (optional)\n    $(\"#em-code-field\").style.display = \"\";\n\n    $(\"#edit-modal\").classList.add(\"open\");\n    setTimeout(() => $(\"#em-name\").focus(), 40);\n  }\n\n  function closeEditModal() {\n    $(\"#edit-modal\").classList.remove(\"open\");\n    editingNodeId = null;\n  }\n\n  function saveEditModal() {\n    if (!editingN i.test(s);\n  }\n\n  function openSidePanel(nodeId) {\n    const found = findNode(nodeId);\n    if (!found) return;\n    sidePanelNodeId = nodeId;\n    const node = found.node;\n    document.querySelector(\".app\").classList.add(\"panel-open\");\n    $(\"#sp-eyebrow\").textContent = TYPE_LABEL[node.type] || \"Documento\";\n    $(\"#sp-title\").textContent = node.name || \"(sin nombre)\";\n    $(\"#sp-code\").textContent = node.code || \"\";\n    $(\"#sp-code\").style.display = node.code ? \"\" : \"none\";\n\n    // Status pill\n    const meta = $(\"#sp-meta\");\n    meta.innerHTML = \"\";\n    const pill = document.createElement(\"span\");\n    pill.className = \"status-pill\";\n    pill.dataset.status = node.status || \"OFICIAL\";\n    pill.textContent = node.status || \"OFICIAL\";\n    meta.appendChild(pill);\n\n    $(\"#sp-path-input\").value = node.path || \"\";\n    renderSidePanelViewer(node);\n  }\n\n  function renderSidePanelViewer(node) {\n    const viewer = $(\"#sp-viewer\");\n    const hint = $(\"#sp-hint\");\n    viewer.innerHTML = \"\";\n    hint.style.display = \"none\";\n    hint.textContent = \"\";\n    const path = (node.path || \"\").trim();\n\n    if (!path) {\n      viewer.innerHTML = `<div class=\"sp-empty-viewer\"><strong>Sin ruta configurada<\u002Fstrong><div>Agrega la ruta del archivo arriba y presiona Guardar.<br/>Ejemplo: C:\\\\Users\\\\usuario\\\\documento.docx<\u002Fdiv><\u002Fdiv>`;\n      return;\n    }\n\n    if (isOfficeUrl(path)) {\n      // Use Office Online viewer for Word/Excel/PPT URLs\n      const iframe = document.createElement(\"iframe\");\n      iframe.src = \"https://view.officeapps.live.com/op/embed.aspx?src=\" + encodeURIComponent(path);\n      viewer.appendChild(iframe);\n      return;\n    }\n    if (isWebUrl(path)) {\n      const iframe = document.createElement(\"iframe\");\n      iframe.src = path;\n      iframe.sandbox = \"allow-scripts allow-same-origin allow-forms allow-popups\";\n      viewer.appendChild(iframe);\n      return;\n    }\n\n    // Local or network path — browsers block this. Show instructions.\n    const mac = /macintosh|mac os x/i.test(navigator.userAgent);\n    const isWin = /^[A-Za-z]:\\\\/.test(path) || path.startsWith(\"\\\\\\\\\");\n    let hintMsg = \"\";\n    if (isWin && mac) {\n      hintMsg = \"Esta es una ruta de Windows (\" + path.substring(0, 3) + \"…). Desde Mac no se puede abrir directamente; pide acceso SMB al servidor o copia la ruta y ábrela desde una PC con acceso al disco compartido.\";\n    } else if (isWin) {\n      hintMsg = \"Los navegadores bloquean abrir archivos locales por seguridad. Haz click en <b>Copiar ruta<\u002Fb>, pégala en el Explorador de Windows (Win+E) y presiona Enter para abrir el Word.\";\n    } else {\n      hintMsg = \"Los navegadores bloquean abrir archivos locales por seguridad. Copia la ruta y ábrela desde el Finder / Explorador.\";\n    }\n    hint.innerHTML = hintMsg;\n    hint.style.display = \"\";\n\n    viewer.innerHTML = `\n      <div class=\"sp-empty-viewer\">\n        <svg width=\"42\" height=\"42\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8450A\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/><polyline points=\"14 2 14 8 20 8\"/><line x1=\"9\" y1=\"13\" x2=\"15\" y2=\"13\"/><line x1=\"9\" y1=\"17\" x2=\"15\" y2=\"17\"/><\u002Fsvg>\n        <strong>Documento en ruta local<\u002Fstrong>\n        <div style=\"font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11px;color:#1A1A1A;word-break:break-all;max-width:90%;background:#F5F5F5;padding:8px 10px;margin-top:4px\">${escapeHtml(path)}<\u002Fdiv>\n      <\u002Fdiv>`;\n  }\n\n  function escapeHtml(s) {\n    return String(s).replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]));\n  }\n\n  function closeSidePanel() {\n    document.querySelector(\".app\").classList.remove(\"panel-open\");\n    sidePanelNodeId = null;\n  }\n\n  function copyCurrentPath() {\n    if (!sidePanelNodeId) return;\n    const found = findNode(sidePanelNodeId);\n    if (!found || !found.node.path) { toast(\"No hay ruta configurada\", \"error\"); return; }\n    const path = found.node.path;\n    navigator.clipboard.writeText(path).then(\n      () => toast(\"Ruta copiada al portapapeles\", \"success\"),\n      () => {\n        // Fallback\n        const ta = document.createElement(\"textarea\");\n        ta.value = path; document.body.appendChild(ta); ta.select();\n        try { document.execCommand(\"copy\"); toast(\"Ruta copiada\", \"success\"); }\n        catch(e) { toast(\"No se pudo copiar\", \"error\"); }\n        ta.remove();\n      }\n    );\n  }\n\n  function openCurrentDocument() {\n    if (!sidePanelNodeId) return;\n    const found = findNode(sidePanelNodeId);\n    if (!found) return;\n    const path = (found.node.path || \"\").trim();\n    if (!path) { toast(\"Agrega una ruta primero\", \"error\"); return; }\n    if (isWebUrl(path)) {\n      window.open(path, \"_blank\", \"noopener\");\n      return;\n    }\n    // Local path — try file:// (usually blocked); also copy to clipboard as fallback\n    try {\n      const fileUrl = path.startsWith(\"\\\\\\\\\")\n        ? \"file:\" + path.replace(/\\\\/g, \"/\")\n        : (/^[A-Za-z]:\\\\/.test(path) ? \"file:///\" + path.replace(/\\\\/g, \"/\") : \"file://\" + path);\n      const w = window.open(fileUrl, \"_blank\");\n      if (!w) throw new Error(\"blocked\");\n    } catch(e) {}\n    // Always copy so user has it ready to paste\n    copyCurrentPath();\n  }\n\n  function saveCurrentPath() {\n    if (!sidePanelNodeId) return;\n    const found = findNode(sidePanelNodeId);\n    if (!found) return;\n    found.node.path = $(\"#sp-path-input\").value.trim();\n    saveState();\n    render();\n    renderSidePanelViewer(found.node);\n    toast(\"Ruta guardada\", \"success\");\n  }\n\n  $(\"#sp-close\").addEventListener(\"click\", closeSidePanel);\n  $(\"#sp-open\").addEventListener(\"click\", openCurrentDocument);\n  $(\"#sp-copy\").addEventListener(\"click\", copyCurrentPath);\n  $(\"#sp-path-save\").addEventListener(\"click\", saveCurrentPath);\n  $(\"#sp-path-input\").addEventListener(\"keydown\", (e) => {\n    if (e.key === \"Enter\") saveCurrentPath();\n  });\n\n  // ---------- Init ----------\n  applyPrefs();\n  render();\n})();\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
